<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Otacon Audio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .container { width: 320px; padding: 24px; }
  h1 { font-size: 18px; margin-bottom: 16px; color: #a0a0c0; }
  .status { font-size: 13px; margin-bottom: 20px; color: #808080; }
  .status.connected { color: #4caf50; }
  .status.error { color: #f44336; }
  .controls { display: flex; flex-direction: column; gap: 12px; }
  button { padding: 12px; border: 1px solid #333; border-radius: 6px; background: #262640; color: #e0e0e0; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #333355; }
  button.active { background: #2e5030; border-color: #4caf50; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .level { height: 4px; background: #333; border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .level-bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.05s; }
  .section { margin-bottom: 16px; }
  .section-label { font-size: 11px; text-transform: uppercase; color: #606080; margin-bottom: 6px; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="container">
  <h1>Otacon Audio</h1>
  <div class="status" id="status">Disconnected</div>

  <div class="section">
    <div class="section-label">Phone Call Audio (HFP)</div>
    <button id="hfpListenBtn" onclick="toggleHfpListen()">Listen</button>
    <div class="level"><div class="level-bar" id="hfpListenLevel"></div></div>
  </div>

  <div class="section">
    <div class="section-label">Media Audio (A2DP)</div>
    <button id="mediaListenBtn" onclick="toggleMediaListen()">Listen</button>
    <div class="level"><div class="level-bar" id="mediaListenLevel"></div></div>
  </div>

  <div class="section">
    <div class="section-label">Microphone (Send)</div>
    <button id="micBtn" onclick="toggleMic()">Mic</button>
    <div class="level"><div class="level-bar" id="micLevel"></div></div>
  </div>
</div>

<script>
// HFP state
let HFP_SAMPLE_RATE = 16000;
let HFP_CHANNELS = 1;
let hfpWs = null;
let hfpCtx = null;
let hfpListening = false;
let hfpNextTime = 0;

// Media (A2DP) state
let MEDIA_SAMPLE_RATE = 44100;
let MEDIA_CHANNELS = 2;
let mediaWs = null;
let mediaCtx = null;
let mediaListening = false;
let mediaNextTime = 0;

// Mic state (sends over HFP WS)
let micActive = false;
let micStream = null;
let micProcessor = null;

const FRAME_SIZE = 4096;

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status ' + (cls || '');
}

// --- HFP WebSocket ---

function connectHfp() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  hfpWs = new WebSocket(`${proto}//${location.host}/ws`);
  hfpWs.binaryType = 'arraybuffer';

  hfpWs.onopen = () => setStatus('Connected', 'connected');
  hfpWs.onclose = () => {
    setStatus('Disconnected');
    hfpListening = false;
    micActive = false;
    updateButtons();
    setTimeout(connectHfp, 2000);
  };
  hfpWs.onerror = () => setStatus('Connection error', 'error');

  hfpWs.onmessage = (e) => {
    if (typeof e.data === 'string') {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'config') {
          HFP_SAMPLE_RATE = msg.sampleRate || HFP_SAMPLE_RATE;
          HFP_CHANNELS = msg.channels || HFP_CHANNELS;
          console.log(`HFP config: ${HFP_SAMPLE_RATE}Hz, ${HFP_CHANNELS}ch`);
        }
      } catch (_) {}
      return;
    }

    if (!hfpListening || !hfpCtx) return;
    const pcm = new Int16Array(e.data);
    const float = new Float32Array(pcm.length);
    for (let i = 0; i < pcm.length; i++) float[i] = pcm[i] / 32768;

    const buffer = hfpCtx.createBuffer(HFP_CHANNELS, float.length / HFP_CHANNELS, HFP_SAMPLE_RATE);
    buffer.copyToChannel(float, 0);
    const source = hfpCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(hfpCtx.destination);
    if (!hfpNextTime || hfpNextTime < hfpCtx.currentTime) hfpNextTime = hfpCtx.currentTime + 0.05;
    source.start(hfpNextTime);
    hfpNextTime += (float.length / HFP_CHANNELS) / HFP_SAMPLE_RATE;

    let sum = 0;
    for (let i = 0; i < float.length; i++) sum += float[i] * float[i];
    document.getElementById('hfpListenLevel').style.width = Math.min(100, Math.sqrt(sum / float.length) * 300) + '%';
  };
}

function toggleHfpListen() {
  if (!hfpListening) {
    hfpCtx = new AudioContext({ sampleRate: HFP_SAMPLE_RATE });
    hfpListening = true;
  } else {
    hfpListening = false;
    if (hfpCtx) { hfpCtx.close(); hfpCtx = null; }
    hfpNextTime = 0;
    document.getElementById('hfpListenLevel').style.width = '0%';
  }
  updateButtons();
}

// --- Media (A2DP) WebSocket ---

function connectMedia() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  mediaWs = new WebSocket(`${proto}//${location.host}/ws/media`);
  mediaWs.binaryType = 'arraybuffer';

  mediaWs.onclose = () => {
    mediaListening = false;
    updateButtons();
    setTimeout(connectMedia, 2000);
  };

  mediaWs.onmessage = (e) => {
    if (typeof e.data === 'string') {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'config') {
          MEDIA_SAMPLE_RATE = msg.sampleRate || MEDIA_SAMPLE_RATE;
          MEDIA_CHANNELS = msg.channels || MEDIA_CHANNELS;
          console.log(`Media config: ${MEDIA_SAMPLE_RATE}Hz, ${MEDIA_CHANNELS}ch`);
        }
      } catch (_) {}
      return;
    }

    if (!mediaListening || !mediaCtx) return;
    const pcm = new Int16Array(e.data);
    const samplesPerChannel = pcm.length / MEDIA_CHANNELS;
    const buffer = mediaCtx.createBuffer(MEDIA_CHANNELS, samplesPerChannel, MEDIA_SAMPLE_RATE);

    for (let ch = 0; ch < MEDIA_CHANNELS; ch++) {
      const float = new Float32Array(samplesPerChannel);
      for (let i = 0; i < samplesPerChannel; i++) float[i] = pcm[i * MEDIA_CHANNELS + ch] / 32768;
      buffer.copyToChannel(float, ch);
    }

    const source = mediaCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(mediaCtx.destination);
    if (!mediaNextTime || mediaNextTime < mediaCtx.currentTime) mediaNextTime = mediaCtx.currentTime + 0.05;
    source.start(mediaNextTime);
    mediaNextTime += samplesPerChannel / MEDIA_SAMPLE_RATE;

    // Level meter from first channel
    const ch0 = buffer.getChannelData(0);
    let sum = 0;
    for (let i = 0; i < ch0.length; i++) sum += ch0[i] * ch0[i];
    document.getElementById('mediaListenLevel').style.width = Math.min(100, Math.sqrt(sum / ch0.length) * 300) + '%';
  };
}

function toggleMediaListen() {
  if (!mediaListening) {
    mediaCtx = new AudioContext({ sampleRate: MEDIA_SAMPLE_RATE });
    mediaListening = true;
  } else {
    mediaListening = false;
    if (mediaCtx) { mediaCtx.close(); mediaCtx = null; }
    mediaNextTime = 0;
    document.getElementById('mediaListenLevel').style.width = '0%';
  }
  updateButtons();
}

// --- Mic (sends over HFP WS) ---

async function toggleMic() {
  if (!micActive) {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { sampleRate: HFP_SAMPLE_RATE, channelCount: HFP_CHANNELS, echoCancellation: true }
      });
      const ctx = new AudioContext({ sampleRate: HFP_SAMPLE_RATE });
      const source = ctx.createMediaStreamSource(micStream);

      micProcessor = ctx.createScriptProcessor(FRAME_SIZE / 2, 1, 1);
      micProcessor._ctx = ctx;
      micProcessor.onaudioprocess = (e) => {
        if (!hfpWs || hfpWs.readyState !== WebSocket.OPEN) return;
        const float = e.inputBuffer.getChannelData(0);
        const pcm = new Int16Array(float.length);
        for (let i = 0; i < float.length; i++) {
          pcm[i] = Math.max(-32768, Math.min(32767, float[i] * 32768));
        }
        hfpWs.send(pcm.buffer);

        let sum = 0;
        for (let i = 0; i < float.length; i++) sum += float[i] * float[i];
        document.getElementById('micLevel').style.width = Math.min(100, Math.sqrt(sum / float.length) * 300) + '%';
      };

      source.connect(micProcessor);
      micProcessor.connect(ctx.destination);
      micActive = true;
    } catch (e) {
      setStatus('Mic access denied', 'error');
      return;
    }
  } else {
    if (micProcessor) {
      micProcessor.disconnect();
      micProcessor._ctx.close();
      micProcessor = null;
    }
    if (micStream) {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
    }
    micActive = false;
    document.getElementById('micLevel').style.width = '0%';
  }
  updateButtons();
}

function updateButtons() {
  const hb = document.getElementById('hfpListenBtn');
  hb.textContent = hfpListening ? 'Stop Listening' : 'Listen';
  hb.className = hfpListening ? 'active' : '';

  const mb = document.getElementById('mediaListenBtn');
  mb.textContent = mediaListening ? 'Stop Listening' : 'Listen';
  mb.className = mediaListening ? 'active' : '';

  const mic = document.getElementById('micBtn');
  mic.textContent = micActive ? 'Stop Mic' : 'Mic';
  mic.className = micActive ? 'active' : '';
}

connectHfp();
connectMedia();
</script>
</body>
</html>
