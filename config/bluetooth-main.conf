[General]
# Route SCO audio through HCI to userspace (required for PulseAudio HFP in Docker).
# Without this, SCO audio stays in the adapter and headset_audio_gateway profile
# will always report "Not connected".
SCORouting=HCI
Name = Otacon
# Not discoverable by default — we always initiate pairing from Pi side.
# bluetooth-pair.sh enables discoverability temporarily if needed.
Discoverable = false
DiscoverableTimeout = 60
