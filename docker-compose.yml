services:
  otacon:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.otacon
    image: ghcr.io/thisnick/${OTACON_REPO:-otacon}/otacon:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/snd:/dev/snd
      - /etc/tailscale/certs:/certs:ro
      - ${HOME}/.android:/root/.android:ro
      - bt-data:/var/lib/bluetooth
    environment:
      - DISPLAY_NUM=${DISPLAY_NUM:-50}
      - DISPLAY_RESOLUTION=${DISPLAY_RESOLUTION:-540x1204}
      - SCRCPY_MAX_FPS=${SCRCPY_MAX_FPS:-15}
      - SCRCPY_BITRATE=${SCRCPY_BITRATE:-2M}
      - SCRCPY_MAX_SIZE=${SCRCPY_MAX_SIZE:-1204}
      - VNC_PORT=${VNC_PORT:-5900}
      - VNC_PASSWORD=${VNC_PASSWORD}
      - GNIREHTET_DNS=${GNIREHTET_DNS:-8.8.8.8,8.8.4.4}
      - AUDIO_PORT=${AUDIO_PORT:-8080}
      - ALSA_CAPTURE_DEVICE=${ALSA_CAPTURE_DEVICE:-plughw:Device,0}
      - ALSA_PLAYBACK_DEVICE=${ALSA_PLAYBACK_DEVICE:-plughw:Device,0}
      - AUDIO_BACKEND=${AUDIO_BACKEND:-alsa}

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG:-~/.docker}:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL:-300}
      - WATCHTOWER_INCLUDE_STOPPED=false
      - DOCKER_CONFIG=/config.json

volumes:
  bt-data:
