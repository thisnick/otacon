services:
  phone-mirror:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.phone-mirror
    image: ghcr.io/thisnick/${OTACON_REPO:-otacon}/phone-mirror:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ${HOME}/.android:/root/.android:ro
    environment:
      - DISPLAY_NUM=${DISPLAY_NUM:-50}
      - DISPLAY_RESOLUTION=${DISPLAY_RESOLUTION:-540x1204}
      - SCRCPY_MAX_FPS=${SCRCPY_MAX_FPS:-15}
      - SCRCPY_BITRATE=${SCRCPY_BITRATE:-2M}
      - SCRCPY_MAX_SIZE=${SCRCPY_MAX_SIZE:-1204}
      - VNC_PORT=${VNC_PORT:-5900}
      - VNC_PASSWORD=${VNC_PASSWORD}

  gnirehtet:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.gnirehtet
    image: ghcr.io/thisnick/${OTACON_REPO:-otacon}/gnirehtet:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - GNIREHTET_DNS=${GNIREHTET_DNS:-8.8.8.8,8.8.4.4}
    depends_on:
      - phone-mirror

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG:-~/.docker}:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL:-300}
      - WATCHTOWER_INCLUDE_STOPPED=false
      - DOCKER_CONFIG=/config.json
