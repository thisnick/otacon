services:
  phone-mirror:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.phone-mirror
    image: ghcr.io/thisnick/${OTACON_REPO:-otacon}/phone-mirror:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - DISPLAY_NUM=${DISPLAY_NUM:-50}
      - DISPLAY_RESOLUTION=${DISPLAY_RESOLUTION:-1080x2408x24}
      - SCRCPY_MAX_FPS=${SCRCPY_MAX_FPS:-15}
      - SCRCPY_BITRATE=${SCRCPY_BITRATE:-2M}
      - VNC_PORT=${VNC_PORT:-5900}
      - VNC_CLIP=${VNC_CLIP:-984x2193+0+0}
      - VNC_SCALE=${VNC_SCALE:-0.5}

  gnirehtet:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.gnirehtet
    image: ghcr.io/thisnick/${OTACON_REPO:-otacon}/gnirehtet:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - GNIREHTET_DNS=${GNIREHTET_DNS:-8.8.8.8,8.8.4.4}
    depends_on:
      - phone-mirror
