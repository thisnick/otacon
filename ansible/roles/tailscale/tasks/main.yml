---
- name: Check if Tailscale is installed
  command: which tailscale
  register: tailscale_check
  ignore_errors: true
  changed_when: false

- name: Install Tailscale
  shell: curl -fsSL https://tailscale.com/install.sh | sh
  when: tailscale_check.rc != 0

- name: Enable Tailscale service
  systemd:
    name: tailscaled
    enabled: true

- name: Start Tailscale service
  systemd:
    name: tailscaled
    state: started
  when: not pigen_chroot

- name: Create cert directory
  file:
    path: /etc/tailscale/certs
    state: directory
    mode: "0755"

- name: Install cert renewal script
  copy:
    src: tailscale-cert-renew.sh
    dest: /usr/local/bin/tailscale-cert-renew.sh
    mode: "0755"

- name: Install cert renewal service
  copy:
    src: tailscale-cert-renew.service
    dest: /etc/systemd/system/tailscale-cert-renew.service
    mode: "0644"
  notify: reload systemd

- name: Install cert renewal timer
  copy:
    src: tailscale-cert-renew.timer
    dest: /etc/systemd/system/tailscale-cert-renew.timer
    mode: "0644"
  notify: reload systemd

- name: Enable cert renewal timer
  systemd:
    name: tailscale-cert-renew.timer
    enabled: true
    state: started
  when: not pigen_chroot

- name: Generate initial TLS certs
  command: /usr/local/bin/tailscale-cert-renew.sh
  args:
    creates: /etc/tailscale/certs/otacon-pi.crt
  when: not pigen_chroot

- name: Install firstboot script
  copy:
    src: otacon-firstboot.sh
    dest: /usr/local/bin/otacon-firstboot.sh
    mode: "0755"

- name: Install firstboot service
  copy:
    src: otacon-firstboot.service
    dest: /etc/systemd/system/otacon-firstboot.service
    mode: "0644"
  notify: reload systemd

- name: Enable firstboot service
  systemd:
    name: otacon-firstboot
    enabled: true
