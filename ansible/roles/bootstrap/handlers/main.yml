---
- name: reload udev
  command: udevadm control --reload-rules
  when: not pigen_chroot

- name: reload systemd
  systemd:
    daemon_reload: true
  when: not pigen_chroot

- name: restart NetworkManager
  systemd:
    name: NetworkManager
    state: restarted
  when: not pigen_chroot
  ignore_errors: true
